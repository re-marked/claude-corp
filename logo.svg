<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="salmon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b4a"/>
      <stop offset="50%" style="stop-color:#fa8072"/>
      <stop offset="100%" style="stop-color:#e8956a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="512" height="512" rx="64" ry="64" fill="#0a0a0a"/>

  <!-- Subtle grid lines like a terminal -->
  <g opacity="0.04" stroke="#fa8072">
    <line x1="0" y1="64" x2="512" y2="64" stroke-width="0.5"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke-width="0.5"/>
    <line x1="0" y1="192" x2="512" y2="192" stroke-width="0.5"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="512" y2="320" stroke-width="0.5"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke-width="0.5"/>
    <line x1="0" y1="448" x2="512" y2="448" stroke-width="0.5"/>
  </g>

  <!-- Scanline effect -->
  <g opacity="0.02">
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#fa8072"/>
    </pattern>
    <rect width="512" height="512" rx="64" fill="url(#scanlines)"/>
  </g>

  <!-- Terminal prompt bracket cluster - the main icon -->
  <g transform="translate(256, 195)" filter="url(#glow)">
    <!-- > prompt chevron (large) -->
    <polyline points="-70,-55 -20,0 -70,55" fill="none" stroke="url(#salmon)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Cursor block -->
    <rect x="0" y="-8" width="45" height="55" rx="3" fill="url(#salmon)" opacity="0.85"/>

    <!-- Underscore cursor blink -->
    <rect x="55" y="35" width="35" height="8" rx="2" fill="#ff6b4a" opacity="0.6"/>
  </g>

  <!-- Network nodes - representing agents -->
  <g filter="url(#softglow)" opacity="0.35">
    <!-- Top node -->
    <circle cx="256" cy="72" r="4" fill="#fa8072"/>
    <line x1="256" y1="76" x2="256" y2="130" stroke="#fa8072" stroke-width="1" opacity="0.4"/>
    <!-- Left node -->
    <circle cx="120" cy="195" r="4" fill="#fa8072"/>
    <line x1="124" y1="195" x2="175" y2="195" stroke="#fa8072" stroke-width="1" opacity="0.4"/>
    <!-- Right node -->
    <circle cx="392" cy="195" r="4" fill="#fa8072"/>
    <line x1="388" y1="195" x2="340" y2="195" stroke="#fa8072" stroke-width="1" opacity="0.4"/>
    <!-- Bottom left -->
    <circle cx="155" cy="290" r="3" fill="#fa8072"/>
    <line x1="158" y1="287" x2="195" y2="255" stroke="#fa8072" stroke-width="1" opacity="0.3"/>
    <!-- Bottom right -->
    <circle cx="357" cy="290" r="3" fill="#fa8072"/>
    <line x1="354" y1="287" x2="317" y2="255" stroke="#fa8072" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- CLAUDE CORP text - monospace, terminal style -->
  <text x="256" y="370" text-anchor="middle" font-family="'Courier New', 'Fira Code', 'SF Mono', monospace" font-size="56" font-weight="bold" letter-spacing="4" fill="url(#salmon)">claude</text>
  <text x="256" y="420" text-anchor="middle" font-family="'Courier New', 'Fira Code', 'SF Mono', monospace" font-size="56" font-weight="bold" letter-spacing="4" fill="#fa8072" opacity="0.7">corp</text>

  <!-- Tagline as a command -->
  <text x="256" y="458" text-anchor="middle" font-family="'Courier New', 'Fira Code', 'SF Mono', monospace" font-size="11" letter-spacing="2" fill="#fa8072" opacity="0.3">$ your personal corporation</text>
</svg>